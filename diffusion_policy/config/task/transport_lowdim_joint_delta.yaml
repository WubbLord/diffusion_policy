name: transport_lowdim_joint_delta

# object(41) + (eef_pos(3) + eef_quat(4) + gripper_qpos(2) + joint_pos(7))*2
obs_dim: 73
# robot0 and robot1 joint deltas plus one gripper command per arm
action_dim: 16
keypoint_dim: 3

obs_keys: &obs_keys [
  'object',
  'robot0_eef_pos', 'robot0_eef_quat', 'robot0_gripper_qpos', 'robot0_joint_pos',
  'robot1_eef_pos', 'robot1_eef_quat', 'robot1_gripper_qpos', 'robot1_joint_pos'
]
task_name: &task_name transport
dataset_type: &dataset_type ph
dataset_path: &dataset_path data/robomimic/datasets/${task.task_name}/${task.dataset_type}/low_dim.hdf5

env_runner:
  _target_: diffusion_policy.env_runner.robomimic_joint_lowdim_runner.RobomimicJointLowdimRunner
  dataset_path: *dataset_path
  obs_keys: *obs_keys
  n_train: 6
  n_train_vis: 2
  train_start_idx: 0
  n_test: 50
  n_test_vis: 4
  test_start_seed: 100000
  max_steps: ${eval:'500 if "${task.dataset_type}" == "mh" else 400'}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  n_latency_steps: ${n_latency_steps}
  render_hw: [128,128]
  fps: 10
  crf: 22
  past_action: ${past_action_visible}
  n_envs: 28
  n_robots: 2
  joint_dims: [7, 7]
  gripper_dims: [1, 1]
  joint_delta_scale: 0.05
  joint_action_mode: delta
  input_action_layout: joints_then_grippers

dataset:
  _target_: diffusion_policy.dataset.robomimic_replay_joint_delta_lowdim_dataset.RobomimicReplayJointDeltaLowdimDataset
  dataset_path: *dataset_path
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  obs_keys: *obs_keys
  joint_pos_keys: ['robot0_joint_pos', 'robot1_joint_pos']
  joint_action_mode: delta
  include_gripper: True
  gripper_action_indices: [6, 13]
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null

action_mse_slices:
  - name: joint
    start: 0
    end: 14
  - name: gripper
    start: 14
    end: 16
